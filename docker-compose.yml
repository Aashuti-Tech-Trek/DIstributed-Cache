services:
  distributed-cache:
    build: .
    container_name: distributed-cache
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: ["./cache", "-port", "8000", "-capacity", "100"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
